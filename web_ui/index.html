<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>IT-Verwaltung v44</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<nav class="navbar navbar-expand-lg px-3">
  <span class="navbar-brand fw-bold">IT-Verwaltung v44</span>
  <button id="newDeviceBtn" class="btn btn-primary ms-3" onclick="openDeviceWizard()">+ Neues Gerät erfassen</button>
  <input id="globalSearch" class="form-control ms-3" style="max-width:420px" placeholder="Suche im aktuellen Tab">
  <button class="btn btn-outline-secondary ms-2" onclick="clearSearch()">Suche löschen</button>
  <button class="btn btn-outline-primary ms-2" onclick="reloadStammdaten()">Stammdaten neu laden</button>
  <div id="roleControl" class="ms-auto"></div>
</nav>
<div class="container-fluid p-3">
  <ul class="nav nav-tabs" id="tabs"></ul>
  <div id="tabContent" class="pt-3"></div>
</div>

<div class="modal fade" id="deviceWizardModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Neues Gerät erfassen</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><div id="wizardSteps" class="wizard-steps"></div><div id="wizardBody"></div></div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="wizardBack()">Zurück</button><button class="btn btn-primary" onclick="wizardNext()" id="wizardNextBtn">Weiter</button><button class="btn btn-success d-none" onclick="wizardSave()" id="wizardSaveBtn">Asset final erstellen</button></div>
  </div></div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="editTitle">Eintrag</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><div id="editForm" class="form-grid"></div><div id="editWarnings" class="mt-3"></div><p class="readonly-note mt-3">Bedingte Logik aktiviert: Felder werden abhängig von Gerätetyp, Status, Netzwerktyp und Ticketstatus gesperrt oder eingeblendet.</p></div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button><button class="btn btn-primary" onclick="saveModal()">Speichern</button></div>
  </div></div>
</div>
<div id="toast" class="toastx"></div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="js/ui.js"></script>
<script src="js/core.js"></script>
<script src="js/data-api.js"></script>
<script src="js/admin.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/stammdaten.js"></script>
<script src="js/help.js"></script>
<script src="js/app.js"></script>
</body>
</html>
